# Declared worker fleet — single source of truth for placement.
# A small generator renders each host's docker-compose.yml from this (replaces the
# inline heredocs in scripts/deploy_celery_worker.sh).
# DRAFT — review hosts/queues/concurrency against KB #6 before landing.

registry: 192.168.51.206:3000/showbuild     # Gitea container registry (AgentBox)

defaults:
  redis_url: redis://:${REDIS_PASSWORD}@192.168.51.223:6379/0
  database_url: postgresql://showbuild:showbuild@192.168.51.238:5433/showbuild   # prefect (FIX: was hardcoded to .210 in old compose)
  media_root: /mnt/sync/disaffected
  restart: unless-stopped
  max_tasks_per_child: 25

# flavors map to the Dockerfiles in this dir; build-push.sh tags them:
#   <registry>/worker-base:<tag> | worker-media-cpu:<tag> | worker-media-gpu:<tag>
flavors:
  base:       worker-base
  media-cpu:  worker-media-cpu
  media-gpu:  worker-media-gpu

workers:
  # --- prefect (192.168.51.238) — host of broker-adjacent + LLM ---
  - host: prefect
    name: llm-content
    flavor: base
    queues: [llm_content]
    concurrency: 1            # single-stream LLM
  - host: prefect
    name: media
    flavor: media-gpu         # prefect has an RTX 3060
    gpu: all
    queues: [media, assets_high, assets, assets_low]
    concurrency: 3            # tune to 3060 nvenc session ceiling
  # celery-beat runs from the app image / compose, NOT a worker flavor (see note)

  # --- kairo (192.168.51.197) — GPU media + fsq ---
  - host: kairo
    name: media
    flavor: media-gpu         # RTX 3090
    gpu: all
    queues: [media, assets, fsq, assets_low]
    concurrency: 4
    mounts: [/mnt/whisperbox/sync]

  # --- proxima (192.168.51.208) — media (flavor depends on whether it has a card) ---
  - host: proxima
    name: media
    flavor: media-gpu         # if no GPU, switch to media-cpu (failover code is identical)
    gpu: all
    queues: [media, assets_low]
    concurrency: 4

  # --- whisperbox (192.168.51.210) — transcription, Redis-only, no DB ---
  - host: whisperbox
    name: whisper
    flavor: base              # calls Whisper API over HTTP; no ffmpeg/GPU encode here
    queues: [whisper]
    concurrency: 2
    redis_only: true          # omit DATABASE_URL

# NOTE: celery-beat and the FastAPI `server` are NOT in this fleet — they build from
# the existing /Dockerfile (app image) via the main docker-compose.yml and are out
# of scope for the worker-flavor refactor. Beat stays a single instance.
