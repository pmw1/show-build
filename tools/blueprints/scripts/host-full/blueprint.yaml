name: Host Script (Full)
id: host-full
version: "1.0"
description: Complete host script with all cues, visuals, and production info
author: Show-Build System

output:
  format: pdf
  fallback: html
  page_size: letter
  margins:
    top: 0.75in
    bottom: 0.75in
    left: 0.75in
    right: 0.75in

typography:
  body:
    font_family: "Helvetica, Arial, sans-serif"
    font_size: 16pt
    line_height: 1.6
  show_title:
    font_family: "Montserrat, Helvetica, Arial, sans-serif"
    font_size: 42pt
  header:
    font_size: 22pt
  segment_title:
    font_size: 18pt

features:
  cover_page: true
  block_headers: true
  block_summary: true
  media_embedding: true
  speaker_tags: true
  cue_visuals: full          # full, minimal, none
  transcriptions: true
  outcues: true
  page_numbers: true

speakers:
  josh:
    display_name: JOSH
    color: "#1565c0"
    background: "#e3f2fd"
  host:
    display_name: HOST
    color: "#1565c0"
    background: "#e3f2fd"
  guest:
    display_name: GUEST
    color: "#2e7d32"
    background: "#e8f5e9"
  caller:
    display_name: CALLER
    color: "#ef6c00"
    background: "#fff3e0"
  announcer:
    display_name: ANNOUNCER
    color: "#7b1fa2"
    background: "#f3e5f5"
  narrator:
    display_name: NARRATOR
    color: "#5d4037"
    background: "#efebe9"

cue_styles:
  fsq:
    label: FSQ
    border_color: "#9e9e9e"
    background: "#fafafa"
  sot:
    label: SOT
    border_color: "#ffc107"
    background: "#fff8e1"
    icon: "▶"
  img:
    label: IMG
    border_color: "#ddd"
    background: "#f5f5f5"
  gfx:
    label: GFX
    border_color: "#ddd"
    background: "#f5f5f5"

files:
  template: template.html
  styles: styles.css
  partials:
    cover: partials/cover.html
    block: partials/block.html
    segment: partials/segment.html
    cues:
      fsq: partials/cues/fsq.html
      sot: partials/cues/sot.html
      img: partials/cues/img.html
