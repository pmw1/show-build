; ============================================================================
; Show-Build Conference Dialplan Configuration
; For Asterisk server at 192.168.51.223
; DID: +1-802-221-4885 (18022214885)
; ============================================================================

[from-flowroute]
; Handle incoming calls from Flowroute DID
exten => 18022214885,1,NoOp(Incoming Show-Build Conference Call)
    same => n,Answer()
    same => n,Wait(1)
    same => n,Playback(welcome)
    same => n,Goto(conference-entry,s,1)

[conference-entry]
; Conference PIN entry system
exten => s,1,NoOp(Conference Entry)
    same => n,Set(ATTEMPTS=0)
    same => n,Goto(get-pin,1)

exten => get-pin,1,NoOp(Getting Conference PIN)
    same => n,Set(ATTEMPTS=$[${ATTEMPTS} + 1])
    same => n,Read(CONFERENCE_PIN,enter-conf-pin-number,6,,,10)
    same => n,NoOp(PIN entered: ${CONFERENCE_PIN})
    same => n,GotoIf($["${CONFERENCE_PIN}" = ""]?invalid-pin,1)
    same => n,Goto(validate-pin,1)

exten => validate-pin,1,NoOp(Validating PIN: ${CONFERENCE_PIN})
    ; Check if conference with this PIN exists
    same => n,Set(CONF_EXISTS=${SHELL(echo "import sys; sys.path.append('/app'); from asterisk_pin_validator import validate_pin; print(validate_pin('${CONFERENCE_PIN}'))")})
    same => n,GotoIf($["${CONF_EXISTS}" = "valid"]?join-conference,1:invalid-pin,1)

exten => join-conference,1,NoOp(Joining conference with PIN ${CONFERENCE_PIN})
    same => n,Playback(conf-now-joining)
    ; Ask caller to state their name
    same => n,Playback(conf-please-state-name)
    same => n,Wait(1)
    same => n,Record(/tmp/conference-intro-${UNIQUEID}.wav,3,30,y)
    same => n,Wait(1)
    ; Join the conference bridge
    same => n,Set(CONFBRIDGE(user,marked)=yes)
    same => n,Set(CONFBRIDGE(user,announcement)=conf-now-joining)
    same => n,ConfBridge(ep-${CONFERENCE_PIN},default_bridge,default_user)
    same => n,Hangup()

exten => invalid-pin,1,NoOp(Invalid PIN - Attempt ${ATTEMPTS})
    same => n,GotoIf($[${ATTEMPTS} >= 3]?max-attempts,1)
    same => n,Playback(conf-invalid-pin)
    same => n,Goto(get-pin,1)

exten => max-attempts,1,NoOp(Maximum attempts reached)
    same => n,Playback(goodbye)
    same => n,Hangup()

; ============================================================================
; Conference Bridge Profiles
; ============================================================================
; Add to /etc/asterisk/confbridge.conf:
;
; [default_bridge]
; type=bridge
; max_members=50
; record_conference=yes
; record_file=/var/spool/asterisk/monitor/conf-${CONFBRIDGE(bridge,name)}-%Y%m%d-%H%M%S.wav
; mixing_interval=20
; video_mode=follow_talker
;
; [default_user]
; type=user
; marked=no
; startmuted=no
; music_on_hold_when_empty=yes
; quiet=no
; announce_user_count=yes
; announce_user_count_all=yes
; announce_only_user=yes
; dtmf_passthrough=yes
; ============================================================================
