services:
  server:
    build:
      context: .
      no_cache: true
    container_name: show-build-server
    user: "1000:1001"  # Run as kevin:disaffected to match file ownership
    ports:
      - "0.0.0.0:8888:80"
    volumes:
      - ./app:/app
      - ./app/storage:/app/storage
      - /mnt/sync/disaffected/logs:/home/logs
      - /mnt/sync/shared_media:/shared_media
      - /mnt/sync/disaffected/episodes:/home/episodes
      - /mnt/asterisk/recordings:/asterisk/recordings:ro
      - /home/kevin/.claude/todos:/home/kevin/.claude/todos:ro
    networks:
      - video-post
    environment:
      - TZ=America/New_York
      - MODULE_NAME=main
      - VARIABLE_NAME=app
      - WEB_CONCURRENCY=1
      - TIMEOUT=300
      - GRACEFUL_TIMEOUT=300
      - JWT_SECRET_KEY=ea7GZD3mQy3EZYD4YZsFmr/9JwBgZFCaWyznnjhOyow=
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=2880
      - MEDIA_ROOT=/home
      - REDIS_URL=redis://:showbuild2025@192.168.51.223:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mqtt-broker
      - postgres

  postgres:
    image: postgres:13
    container_name: show-build-postgres
    environment:
      POSTGRES_DB: showbuild
      POSTGRES_USER: showbuild
      POSTGRES_PASSWORD: showbuild
    ports:
      - "0.0.0.0:5433:5432"  # Map to 5433 externally to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - video-post
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showbuild -d showbuild"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./disaffected-ui
      target: development
      no_cache: true
    container_name: show-build-frontend
    ports:
      - "0.0.0.0:8091:8080"  # HTTPS Vue dev server runs on 8080
    volumes:
      - ./disaffected-ui/src:/app/src  # Mount source for hot reload
      - ./disaffected-ui/public:/app/public
      - ./disaffected-ui/package.json:/app/package.json
      - ./disaffected-ui/package-lock.json:/app/package-lock.json
      - ./disaffected-ui/vue.config.js:/app/vue.config.js
      - ./disaffected-ui/ssl:/app/ssl  # Mount SSL certificates
    networks:
      - video-post
    depends_on:
      - server
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - VUE_APP_API_URL=http://localhost:8888
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -k -f https://localhost:8080 || curl -f http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mqtt-broker:
    image: eclipse-mosquitto
    container_name: mqtt-broker
    networks:
      - video-post
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      # Mount Mosquitto config for remote access
      - ./tools/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres_data:

networks:
  video-post:

